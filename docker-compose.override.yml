services:
  website:
    ports:
      - "80:8080"
      - "443:8443"
      - "8080:8080"
      - "8443:8443"
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--no-check-certificate", "--spider", "https://127.0.0.1:8443/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./privacy.html:/usr/share/nginx/html/privacy.html
      - ./aloe_plant_green.png:/usr/share/nginx/html/aloe_plant_green.png
      - ./nginx.conf:/etc/nginx/nginx.conf

  backend:
    ports:
      - "9230:9230"
    command: node --inspect=0.0.0.0:9230 server.js
    environment:
      - POSTGRES_HOST=host.docker.internal
      - POSTGRES_PORT=5435
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=mysecretpassword
    volumes:
      - ./backend:/app
      - /app/node_modules
